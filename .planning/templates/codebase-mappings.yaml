# Directory Mappings Template
# Generated by codebase-mapper skill
# Used for path enforcement in spec-pipeline and wave-executor

generated: "YYYY-MM-DD"
source: "CODEBASE.md"
version: "1.0"

# Mapping categories and their standard locations
# Priority: explicit (10) = framework-standard, inferred (5) = convention, default (1) = fallback
mappings:
  routes:
    paths:
      - "app/routes"
      - "src/routes"
      - "pages/api"
      - "routes"
    priority: 10
    pattern: "**/*.{ts,js}"
    description: "API routes, page routes, and endpoint handlers"
    examples:
      - "app/routes/users.ts"
      - "src/routes/api.ts"

  tests:
    paths:
      - "tests"
      - "__tests__"
      - "test"
      - "spec"
    priority: 10
    pattern: "**/*.test.{ts,js,tsx,jsx,py}"
    description: "Test files - co-located or in dedicated directories"
    examples:
      - "tests/unit/utils.test.ts"
      - "src/components/Button.test.tsx"

  components:
    paths:
      - "src/components"
      - "app/components"
      - "components"
      - "ui"
      - "widgets"
    priority: 10
    pattern: "**/*.{tsx,jsx,vue,svelte}"
    description: "UI components and reusable visual elements"
    examples:
      - "src/components/Button.tsx"
      - "app/components/Header.vue"

  services:
    paths:
      - "src/services"
      - "services"
      - "lib/services"
      - "core"
    priority: 5
    pattern: "**/*.{ts,js}"
    description: "Business logic services and domain operations"
    examples:
      - "src/services/userService.ts"

  utils:
    paths:
      - "src/utils"
      - "utils"
      - "lib"
      - "helpers"
      - "common"
    priority: 5
    pattern: "**/*.{ts,js}"
    description: "Utility functions and helper modules"
    examples:
      - "src/utils/date.ts"

  types:
    paths:
      - "src/types"
      - "types"
      - "interfaces"
      - "models"
    priority: 5
    pattern: "**/*.{ts,d.ts}"
    description: "TypeScript type definitions and interfaces"
    examples:
      - "src/types/user.ts"

  config:
    paths:
      - "config"
      - ".config"
      - "configuration"
    priority: 5
    pattern: "**/*.{ts,js,json,yaml,yml}"
    description: "Configuration files and settings"
    examples:
      - "config/database.ts"

  middleware:
    paths:
      - "src/middleware"
      - "middleware"
      - "plugins"
    priority: 5
    pattern: "**/*.{ts,js}"
    description: "Middleware, plugins, and request interceptors"
    examples:
      - "src/middleware/auth.ts"

  assets:
    paths:
      - "public"
      - "static"
      - "assets"
      - "resources"
    priority: 5
    pattern: "**/*.{png,jpg,svg,css,woff,woff2}"
    description: "Static assets, images, fonts, and stylesheets"
    examples:
      - "public/logo.svg"

  styles:
    paths:
      - "styles"
      - "css"
      - "scss"
      - "sass"
      - "src/styles"
    priority: 5
    pattern: "**/*.{css,scss,sass,less}"
    description: "Stylesheets and CSS modules"
    examples:
      - "styles/global.css"

  hooks:
    paths:
      - "src/hooks"
      - "hooks"
      - "composables"
    priority: 5
    pattern: "**/*.{ts,js}"
    description: "React hooks, Vue composables, or similar"
    examples:
      - "src/hooks/useAuth.ts"

  stores:
    paths:
      - "src/stores"
      - "stores"
      - "state"
      - "redux"
      - "pinia"
    priority: 5
    pattern: "**/*.{ts,js}"
    description: "State management stores and reducers"
    examples:
      - "src/stores/authStore.ts"

# For monorepos, per-package mappings
packages: {}

# Path enforcement configuration
enforcement:
  strictness: warn  # Options: strict (error), warn (warning), off (no enforcement)
  exceptions: []    # List of glob patterns exempt from enforcement
  suggestions: true # Whether to suggest correct paths for violations
